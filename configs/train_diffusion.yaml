defaults:
  - model: diffusion
  - dataset: cifar10
  - _self_

hydra:
  run:
    dir: experiments/diffusion/${dataset.name}/${now:%Y-%m-%d_%H-%M-%S}
  job:
    chdir: True

diffusion:
  timesteps: 1000
  beta_schedule: "linear"
  loss_type: "l2"

training:
  epochs: 100
  batch_size: 128
  learning_rate: 1e-4
  weight_decay: 0.0
  num_workers: 4
  log_interval: 100
  checkpoint_dir: "checkpoints"
  checkpoint_name: "ddpm_${dataset.name}.pth"
  log_dir: "tensorboard"
  sample_interval: 10 # Sample every N epochs
  num_samples: 16
