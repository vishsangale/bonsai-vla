defaults:
  - model: simple_vit
  - dataset: cifar10
  - _self_

training:
  model_name: "simple_vit"
  augmentation: "randaugment"
  epochs: 300
  batch_size: 512
  learning_rate: 6e-4
  weight_decay: 0.1
  num_workers: 4
  log_interval: 10
  checkpoint_dir: "checkpoints"
  checkpoint_name: "simple_vit_${dataset.name}.pth"
  log_dir: "tensorboard"
