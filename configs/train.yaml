defaults:
  - model: vit
  - dataset: cifar10
  - _self_

hydra:
  run:
    dir: experiments/${dataset.name}/${now:%Y-%m-%d_%H-%M-%S}
  job:
    chdir: True

training:
  epochs: 100
  batch_size: 64
  learning_rate: 3e-4
  weight_decay: 1e-4
  num_workers: 2
  log_interval: 100
  checkpoint_dir: "checkpoints"
  checkpoint_name: "vit_${dataset.name}.pth"
  log_dir: "tensorboard"
